
env = XCURSOR_SIZE,12
env = HYPRCURSOR_SIZE,12


general {
    gaps_in = 4
    gaps_out = 5

	border_size = 0

    col.active_border = rgba(d7c483ff) rgba(5f875fff) 50deg
    col.inactive_border = rgba(504945aa)

    resize_on_border = false

    allow_tearing = false

    # layout = master
    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 0.78

    shadow {
        enabled = false
        range = 10
        render_power = 6
		# ignore_window = true
        color = rgba(000000ee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 10
        passes = 3
        #Popus disbale blur:
        popups = false
        vibrancy = 0.5
    }
}
