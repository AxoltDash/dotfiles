# =-- HYPRLAND CONFIGURATION -= #
      # -- By AxoltDash -- #

# See the next modules :
source = ~/.config/hypr/mod/monitors.conf
source = ~/.config/hypr/mod/keybinds.conf
source = ~/.config/hypr/mod/autostart.conf
source = ~/.config/hypr/apparance/animations.conf
source = ~/.config/hypr/apparance/decoration.conf
source = ~/.config/hypr/apparance/windowrules.conf



###################
### Layer Rules ###
###################

layerrule = blur true, match:namespace waybar
layerrule = blur true, match:namespace zen
layerrule = blur false, match:namespace selection
layerrule {
	name = rofi
	match:class = ^(rofi)$
	blur = true
	ignore_alpha = 0
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us,us,latam
    kb_variant = ,intl,
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =

	repeat_delay = 250	# default 600
	repeat_rate = 25	# default 25

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        disable_while_typing = false
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5<D-f>
}


