# =-- Keybins --= #

$mainMod = SUPER



# -- Movement -- #

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod, B, cyclenext




# -- Workspaces -- #

# - Switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod, X, togglespecialworkspace, magic
bind = $mainMod, minus, togglespecialworkspace, magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# - Moving
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod SHIFT, X, movetoworkspace, special:magic
bind = $mainMod SHIFT, minus, movetoworkspace, special:magic




# -- Windows -- #

# - Resize
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, down, resizeactive, 0 100
bind = $mainMod SHIFT, up, resizeactive, 0 -100
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, H, resizeactive, -100 0
bind = $mainMod SHIFT, J, resizeactive, 0 100
bind = $mainMod SHIFT, K, resizeactive, 0 -100
bind = $mainMod SHIFT, L, resizeactive, 100 0


# - Move
bindm = $mainMod, mouse:272, movewindow

bind = $mainMod ALT, left, movewindow, l
bind = $mainMod ALT, down, movewindow, d
bind = $mainMod ALT, up, movewindow, u
bind = $mainMod ALT, right, movewindow, r
bind = $mainMod ALT, H, movewindow, l
bind = $mainMod ALT, J, movewindow, d
bind = $mainMod ALT, K, movewindow, u
bind = $mainMod ALT, L, movewindow, r


# - Move Floating
bind = $mainMod CTRL, left, moveactive, -200 0
bind = $mainMod CTRL, down, moveactive, 0 200
bind = $mainMod CTRL, up, moveactive, 0 -200
bind = $mainMod CTRL, right, moveactive, 200 0
bind = $mainMod CTRL, H, moveactive, -200 0
bind = $mainMod CTRL, J, moveactive, 0 200
bind = $mainMod CTRL, K, moveactive, 0 -200
bind = $mainMod CTRL, L, moveactive, 200 0

bind = $mainMod ALT, B, exec, hyprctl dispatch centerwindow


# - Floating
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, V, exec, hyprctl dispatch togglefloating active && hyprctl dispatch resizeactive exact 900 600 && hyprctl dispatch centerwindow
bind = $mainMod ALT, V, exec, hyprctl dispatch togglefloating active && hyprctl dispatch resizeactive exact 1280 960 && hyprctl dispatch centerwindow


# - Fullscreen
bind = $mainMod, Tab, fullscreen,


# - Splits
bind = $mainMod, O, pseudo, # dwindle
bind = $mainMod, I, layoutmsg, togglesplit  # dwindle


# - Kills
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, Q, killactive,
bindel = ALT, XF86AudioPlay, killactive,
bindel = ALT, F4, killactive,




# -- Executable -- #

# - Terminal
$term = kitty
$term2 = cool-retro-term

bind = $mainMod, Return, exec, $term
bind = $mainMod, T, exec, $term
bind = $mainMod, Q, exec, $term
bind = $mainMod CTRL, Return, exec, $term2
bind = $mainMod CTRL, T, exec, $term2
bind = $mainMod CTRL, Q, exec, $term2


# - Launchers
bind = $mainMod, D, exec, rofi -show drun
bind = $mainMod, A, exec, bash ~/.config/rofi/scripts/web-launch.sh
bind = $mainMod, G, exec, bash ~/.config/rofi/scripts/monitor-switch.sh
bind = $mainMod SHIFT, G, exec, bash ~/.config/rofi/scripts/audio-switch.sh
bind = $mainMod, Y, exec, bash ~/.config/rofi/scripts/usb.sh
# bind = $mainMod SHIFT, G, exec, rofi -show emoji
# bind = $mainMod, G, exec, $menuEmoji -emoji-file ~/.config/rofi/scripts/gitmoji.txt2


# - File Manager
bind = $mainMod, E, exec, nautilus


# - Web Browser
bind = $mainMod, F, exec, app.zen_browser.zen


# - Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-


# - Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# - Hyprlock
# bindl = , XF86WakeUp, exec, hyprlock


# - Screenshots
bind = , Print, exec, grim - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png | wl-copy
bind = $mainMod , P, exec, grim - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png | wl-copy
bind = SHIFT , Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png | wl-copy
bind = $mainMod SHIFT , Print, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png | wl-copy
bind = $mainMod SHIFT , S, exec, grim -g "$(slurp)" - | tee ~/Pictures/screenshots/$(date +%Y-%m-%d-%H-%M-%S).png | wl-copy
bind = $mainMod ALT , S , exec , ~/.config/hypr/scripts/ocr.sh


# - Exit
bind = $mainMod SHIFT, M, exit,


# - PowerOff
bind = $mainMod ALT, M, exec, poweroff
